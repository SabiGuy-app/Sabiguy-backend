name: Backend CI/CD Pipeline
on:
  push:
    branches:
      - main
      - dev
env:
  AWS_REGION: us-east-1
  CONTAINER_NAME: sabiguy-backend
  ECR_REPOSITORY: 914471710952.dkr.ecr.us-east-1.amazonaws.com/sabiguy-staging-backend
  EC2_USERNAME: ec2-user
jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and tag docker image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker build -t $IMAGE_URI .
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Push docker image to ECR
        run: |
          IMAGE_URI=${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $IMAGE_URI

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          envs: PORT,JWT_SECRET,DATABASE_URL,GOOGLE_CLIENT_ID,CLOUD_NAME,CLOUD_API_SECRET,CLOUD_API_KEY,FRONTEND_URL,BREVO_API_KEY,BREVO_SENDER_EMAIL,FIREBASE_CLIENT_EMAIL,FIREBASE_API_KEY,FIREBASE_AUTH_DOMAIN,FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET,FIREBASE_MESSAGING_SENDER_ID,FIREBASE_APP_ID,FIREBASE_PRIVATE_KEY,PAYSTACK_SECRET_KEY,PAYSTACK_PUBLIC_KEY,MAPBOX_ACCESS_TOKEN,GEMINI_API_KEY,GROQ_API_KEY,SABIGUY_LOGO_URL,IMAGE_URI,CONTAINER_NAME
          env: |
            PORT=${{ secrets.PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            CLOUD_NAME=${{ secrets.CLOUD_NAME }}
            CLOUD_API_SECRET=${{ secrets.CLOUD_API_SECRET }}
            CLOUD_API_KEY=${{ secrets.CLOUD_API_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            PAYSTACK_SECRET_KEY=${{ secrets.PAYSTACK_SECRET_KEY }}
            PAYSTACK_PUBLIC_KEY=${{ secrets.PAYSTACK_PUBLIC_KEY }}
            MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            SABIGUY_LOGO_URL=${{ secrets.SABIGUY_LOGO_URL }}
            IMAGE_URI=${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            CONTAINER_NAME=${{ env.CONTAINER_NAME }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 914471710952.dkr.ecr.us-east-1.amazonaws.com
            docker pull $IMAGE_URI
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker run -d --name "$CONTAINER_NAME" -p 3000:3000 \
              -e PORT="$PORT" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e DATABASE_URL="$DATABASE_URL" \
              -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              -e CLOUD_NAME="$CLOUD_NAME" \
              -e CLOUD_API_SECRET="$CLOUD_API_SECRET" \
              -e CLOUD_API_KEY="$CLOUD_API_KEY" \
              -e FRONTEND_URL="$FRONTEND_URL" \
              -e BREVO_API_KEY="$BREVO_API_KEY" \
              -e BREVO_SENDER_EMAIL="$BREVO_SENDER_EMAIL" \
              -e FIREBASE_CLIENT_EMAIL="$FIREBASE_CLIENT_EMAIL" \
              -e FIREBASE_API_KEY="$FIREBASE_API_KEY" \
              -e FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN" \
              -e FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
              -e FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
              -e FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID" \
              -e FIREBASE_APP_ID="$FIREBASE_APP_ID" \
              -e FIREBASE_PRIVATE_KEY="$FIREBASE_PRIVATE_KEY" \
              -e PAYSTACK_SECRET_KEY="$PAYSTACK_SECRET_KEY" \
              -e PAYSTACK_PUBLIC_KEY="$PAYSTACK_PUBLIC_KEY" \
              -e MAPBOX_ACCESS_TOKEN="$MAPBOX_ACCESS_TOKEN" \
              -e GEMINI_API_KEY="$GEMINI_API_KEY" \
              -e GROQ_API_KEY="$GROQ_API_KEY" \
              -e SABIGUY_LOGO_URL="$SABIGUY_LOGO_URL" \
              "$IMAGE_URI"

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.PRODUCTION_EC2_SSH_KEY }}
          envs: PORT,JWT_SECRET,DATABASE_URL,GOOGLE_CLIENT_ID,CLOUD_NAME,CLOUD_API_SECRET,CLOUD_API_KEY,FRONTEND_URL,BREVO_API_KEY,BREVO_SENDER_EMAIL,FIREBASE_CLIENT_EMAIL,FIREBASE_API_KEY,FIREBASE_AUTH_DOMAIN,FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET,FIREBASE_MESSAGING_SENDER_ID,FIREBASE_APP_ID,FIREBASE_PRIVATE_KEY,PAYSTACK_SECRET_KEY,PAYSTACK_PUBLIC_KEY,MAPBOX_ACCESS_TOKEN,GEMINI_API_KEY,GROQ_API_KEY,SABIGUY_LOGO_URL,IMAGE_URI,CONTAINER_NAME
          env: |
            PORT=${{ secrets.PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            CLOUD_NAME=${{ secrets.CLOUD_NAME }}
            CLOUD_API_SECRET=${{ secrets.CLOUD_API_SECRET }}
            CLOUD_API_KEY=${{ secrets.CLOUD_API_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            PAYSTACK_SECRET_KEY=${{ secrets.PAYSTACK_SECRET_KEY }}
            PAYSTACK_PUBLIC_KEY=${{ secrets.PAYSTACK_PUBLIC_KEY }}
            MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            SABIGUY_LOGO_URL=${{ secrets.SABIGUY_LOGO_URL }}
            IMAGE_URI=${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            CONTAINER_NAME=${{ env.CONTAINER_NAME }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 914471710952.dkr.ecr.us-east-1.amazonaws.com
            docker pull $IMAGE_URI
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker run -d --name "$CONTAINER_NAME" -p 3000:3000 \
              -e PORT="$PORT" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e DATABASE_URL="$DATABASE_URL" \
              -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              -e CLOUD_NAME="$CLOUD_NAME" \
              -e CLOUD_API_SECRET="$CLOUD_API_SECRET" \
              -e CLOUD_API_KEY="$CLOUD_API_KEY" \
              -e FRONTEND_URL="$FRONTEND_URL" \
              -e BREVO_API_KEY="$BREVO_API_KEY" \
              -e BREVO_SENDER_EMAIL="$BREVO_SENDER_EMAIL" \
              -e FIREBASE_CLIENT_EMAIL="$FIREBASE_CLIENT_EMAIL" \
              -e FIREBASE_API_KEY="$FIREBASE_API_KEY" \
              -e FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN" \
              -e FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
              -e FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
              -e FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID" \
              -e FIREBASE_APP_ID="$FIREBASE_APP_ID" \
              -e FIREBASE_PRIVATE_KEY="$FIREBASE_PRIVATE_KEY" \
              -e PAYSTACK_SECRET_KEY="$PAYSTACK_SECRET_KEY" \
              -e PAYSTACK_PUBLIC_KEY="$PAYSTACK_PUBLIC_KEY" \
              -e MAPBOX_ACCESS_TOKEN="$MAPBOX_ACCESS_TOKEN" \
              -e GEMINI_API_KEY="$GEMINI_API_KEY" \
              -e GROQ_API_KEY="$GROQ_API_KEY" \
              -e SABIGUY_LOGO_URL="$SABIGUY_LOGO_URL" \
              "$IMAGE_URI"